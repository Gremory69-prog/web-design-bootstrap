<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registro</title>

<!-- FAVICON -->
<link rel="icon" type="image/png" href="assets/img/favicon.png">

<!-- Bootstrap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>

body{
    min-height:100vh;
    background: linear-gradient(135deg,#eef2f7,#d9e4f5);
    font-family: 'Segoe UI', sans-serif;
}

/* NAVBAR */
.navbar{
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
}

/* FORM CARD */

.container-form{
    min-height:80vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

.card-form{
    width:420px;
    border:none;
    border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,0.1);
    padding:30px;
    background:white;
}

.form-control{
    border-radius:12px;
    padding-left:40px;
    height:48px;
}

.input-icon{
    position:relative;
}

.input-icon i{
    position:absolute;
    left:12px;
    top:50%;
    transform:translateY(-50%);
    color:#6c757d;
}

.btn-register{
    border-radius:30px;
    padding:12px;
    font-weight:500;
    background: linear-gradient(90deg,#1e88e5,#1565c0);
    border:none;
}

.title{
    text-align:center;
    margin-bottom:25px;
    font-weight:600;
}

/* FOOTER */

footer{
    background:#111;
    color:white;
    padding:20px;
    text-align:center;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg shadow-sm">
<div class="container">

<a class="navbar-brand fw-bold" href="#">
<i class="bi bi-bootstrap-fill"></i> Sistema
</a>

<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">
<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" href="#">Home</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#">Pager</a>
</li>

<li class="nav-item">
<a class="nav-link active" href="#">Registros</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#">Contact</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#">Login</a>
</li>

</ul>
</div>

</div>
</nav>

<!-- FORMULARIO -->

<div class="container container-form">

<div class="card card-form">

<h3 class="title">Registrarse</h3>

<form>

<div class="mb-3 input-icon">
<i class="bi bi-person"></i>
<input type="text" class="form-control" placeholder="Nombre Completo">
</div>

<div class="mb-3 input-icon">
<i class="bi bi-envelope"></i>
<input type="email" class="form-control" placeholder="Correo Electrónico">
</div>

<div class="mb-3 input-icon">
<i class="bi bi-person-circle"></i>
<input type="text" class="form-control" placeholder="Nombre de Usuario">
</div>

<div class="mb-3 input-icon">
<i class="bi bi-lock"></i>
<input type="password" class="form-control" placeholder="Contraseña">
</div>

<div class="mb-4 input-icon">
<i class="bi bi-calendar"></i>
<input type="date" class="form-control">
</div>

<div class="d-grid">
<button class="btn btn-primary btn-register">
Crear Cuenta
</button>
</div>

</form>

</div>

</div>

<!-- FOOTER -->

<footer>

<p class="mb-1"><strong>Programador:</strong> Francisco Paredes Vargas</p>

<p class="mb-0"><strong>Matrícula:</strong> 22200199</p>

</footer>

<!-- Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
