<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Formulario Tailwind</title>

<link rel="icon" href="assets/img/favicon.png">

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 flex flex-col min-h-screen">

<!-- NAVBAR -->

<nav class="bg-white shadow">
<div class="max-w-7xl mx-auto px-4 py-3 flex justify-between">

<h1 class="font-bold text-lg">Sistema</h1>

<div class="space-x-4">
</div>

</div>
</nav>

<!-- FORMULARIO -->

<div class="flex-grow flex items-center justify-center">

<div class="bg-white shadow-lg rounded-xl p-6 w-96">

<h2 class="text-center text-xl font-semibold mb-4">Registrarse</h2>

<form class="space-y-3">

<input class="w-full border p-2 rounded" placeholder="Nombre Completo">

<input class="w-full border p-2 rounded" placeholder="Correo Electrónico">

<input class="w-full border p-2 rounded" placeholder="Nombre de Usuario">

<input type="password" class="w-full border p-2 rounded" placeholder="Contraseña">

<input type="date" class="w-full border p-2 rounded">

<button class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700">
Crear Cuenta
</button>

</form>

</div>

</div>

<!-- FOOTER -->

<footer class="bg-black text-white text-center p-3">

</footer>

</body>
</html>
